<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch Team - Sales Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .file-upload-label { display:block; font-size:.875rem; font-weight:500; margin-bottom:.25rem; color:#374151; }
    .file-input { width:100%; border:1px solid #d1d5db; border-radius:.375rem; padding:.5rem .75rem; font-size:.875rem; }
    .file-selected { display:none; margin-top:.25rem; font-size:.75rem; color:#10b981; font-weight:500; }
    .modal-overlay { background-color:rgba(0,0,0,.5); backdrop-filter:blur(4px); transition:opacity .3s ease-in-out; }
    .modal-content { transition:transform .3s ease-in-out, opacity .3s ease-in-out; }
    .modal-open { transform:translateY(0)!important; opacity:1!important; }
    .order-card { transition:all .3s ease; }
    .order-card:hover { transform:translateY(-2px); }
    .animate-spin-fast { animation:spin 1s linear infinite; }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold">Dispatch Dashboard</h1>
      <div class="flex items-center space-x-4">
        <span id="last-updated" class="text-sm opacity-80"></span>
        <div id="refresh-indicator" class="flex items-center space-x-2 text-sm">
          <svg class="animate-spin-fast h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none;">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span id="refresh-text" class="hidden">Refreshing...</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-6 flex-grow">
    <h2 class="text-3xl font-semibold text-gray-800 mb-6">Approved Sales Orders</h2>
    <div class="editable">
      <a href="https://ntwoods.github.io/audit/warehouseManager" target="_blank" class="inline-block px-4 py-2 bg-blue-600 text-white font-medium rounded hover:bg-blue-700 transition duration-200 shadow">Audit Portal</a>
    </div>

    <div id="loading-spinner" class="flex justify-center items-center py-10" style="display:none;">
      <div class="animate-spin-fast rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
      <p class="ml-4 text-xl text-gray-600">Fetching latest orders...</p>
    </div>

    <div id="error-message" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-6" role="alert" style="display:none;">
      <strong class="font-bold">Oops!</strong>
      <span class="block sm:inline" id="error-text">Something went wrong while fetching data. Please try again later.</span>
      <span class="absolute top-0 bottom-0 right-0 px-4 py-3 cursor-pointer" onclick="document.getElementById('error-message').style.display='none'">&times;</span>
    </div>

    <div id="no-orders-message" class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded relative mb-6" role="alert" style="display:none;">
      <strong class="font-bold">Heads Up!</strong>
      <span class="block sm:inline">No approved sales orders found at the moment.</span>
    </div>

    <div id="orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="order-detail-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 z-50 opacity-0 invisible" style="display:none;">
    <div class="modal-content bg-white rounded-lg shadow-xl p-8 w-full max-w-lg relative transform -translate-y-full opacity-0" role="dialog" aria-modal="true">
      <button id="close-modal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 text-3xl font-semibold">&times;</button>
      <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-3">Order Details</h3>
      <div id="modal-body" class="text-gray-700 text-lg space-y-4"></div>
    </div>
  </div>

  <footer class="bg-gray-800 text-white p-4 text-center text-sm mt-auto">
    <div class="container mx-auto">&copy; <span id="current-year"></span> Dispatch Team Dashboard. All rights reserved.</div>
  </footer>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWIgGY1hug5uU4PZcTbmuzzJyuaaUiW_IZ-3wvLWeItlG3JR-BZ1pLPQJIjXcsUJH/exec";
    const ordersGrid = document.getElementById("orders-grid");
    const loadingSpinner = document.getElementById("loading-spinner");
    const errorMessage = document.getElementById("error-message");
    const errorText = document.getElementById("error-text");
    const noOrdersMessage = document.getElementById("no-orders-message");
    const orderDetailModal = document.getElementById("order-detail-modal");
    const modalBody = document.getElementById("modal-body");
    const closeModalButton = document.getElementById("close-modal");
    const lastUpdatedSpan = document.getElementById("last-updated");
    const refreshIndicator = document.getElementById("refresh-indicator");
    const refreshSpinner = refreshIndicator.querySelector("svg");
    const refreshText = document.getElementById("refresh-text");

    let allOrdersData = [];

    function formatTimestamp(isoString) {
      if (!isoString) return "N/A";
      try {
        return new Date(isoString).toLocaleString("en-IN", { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch (e) {
        return isoString;
      }
    }

    function formatDispatchDate(dateString) {
      if (!dateString) return "N/A";
      try {
        const parts = String(dateString).replace(/\//g, "-").split("-");
        if (parts.length !== 3) return dateString;
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10);
        const day = parseInt(parts[2], 10) + 1;
        if (isNaN(year) || isNaN(month) || isNaN(day)) return dateString;
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${day} ${monthNames[month - 1]} ${year}`;
      } catch (e) {
        return dateString;
      }
    }

    function isPastDate(dateStr) {
      if (!dateStr) return false;
      try {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const parts = String(dateStr).replace(/\//g, "-").split("-");
        if (parts.length !== 3) return false;
        const dispatchDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10) + 1);
        return dispatchDate < today;
      } catch (e) {
        return false;
      }
    }

    function hasInvoiceNumber(invoiceNumbers) {
      return String(invoiceNumbers || "").trim() !== "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
      });
    }

    function handleFileSelect(index) {
      const fileInput = document.getElementById(`file-${index}`);
      const fileSelected = document.getElementById(`file-selected-${index}`);
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        fileSelected.style.display = "block";
        fileSelected.textContent = `File selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      } else {
        fileSelected.style.display = "none";
      }
    }

    function handleFileSelect1(index) {
      const fileInput = document.getElementById(`file1-${index}`);
      const fileSelected = document.getElementById(`file-selected1-${index}`);
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        fileSelected.style.display = "block";
        fileSelected.textContent = `File selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      } else {
        fileSelected.style.display = "none";
      }
    }

    async function markInvoiceCreated(index) {
      const order = allOrdersData[index];
      if (!order) {
        showMessageBox("Order data not found", "error");
        return;
      }
      if (hasInvoiceNumber(order.invoiceNumbers)) {
        showMessageBox("Invoice already created for this order", "info");
        return;
      }

      let invoiceNumbers = prompt("Enter Invoice Number(s). This field is mandatory.");
      if (invoiceNumbers === null) return;
      invoiceNumbers = String(invoiceNumbers).trim();
      if (!invoiceNumbers) {
        showMessageBox("Invoice Number(s) is mandatory", "warning");
        return;
      }

      const button = document.querySelector(`button[onclick=\"markInvoiceCreated(${index})\"]`);
      if (button) {
        button.disabled = true;
        button.textContent = "Saving...";
        button.classList.add("opacity-50", "cursor-not-allowed");
      }

      let saved = false;
      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "invoiceCreated",
            timestamp: order.timestamp,
            orderId: order.orderId,
            invoiceNumbers: invoiceNumbers
          })
        });

        allOrdersData[index].invoiceNumbers = invoiceNumbers;
        saved = true;
        showMessageBox("Invoice Number(s) saved successfully", "success");
        renderOrders(allOrdersData);
        if (typeof setReadOnlyMode === "function") setReadOnlyMode();
      } catch (error) {
        showMessageBox(`Error: ${error.message}`, "error");
      } finally {
        if (button && !saved) {
          button.disabled = false;
          button.textContent = "Invoice Created";
          button.classList.remove("opacity-50", "cursor-not-allowed");
        }
      }
    }

    async function markDone(index) {
      const order = allOrdersData[index];
      if (!order) {
        showMessageBox("Order data not found", "error");
        return;
      }
      if (!hasInvoiceNumber(order.invoiceNumbers)) {
        showMessageBox("Invoice Created must be completed before Mark Done", "warning");
        return;
      }

      const deliveryDate = document.getElementById(`delivery-${index}`).value;
      const generalRemark = document.getElementById(`generalRemark-${index}`).value;
      const vehicleNo = document.getElementById(`vehicleNo-${index}`).value;
      const freight = document.getElementById(`freight-${index}`).value;
      const driverName = document.getElementById(`driverName-${index}`).value;
      const driverMob = document.getElementById(`driverMob-${index}`).value;
      const fileInput = document.getElementById(`file-${index}`);
      const fileInput1 = document.getElementById(`file1-${index}`);

      if (!deliveryDate) {
        showMessageBox("Please select an expected delivery date", "warning");
        return;
      }
      if (driverMob && !/^\d{10}$/.test(driverMob)) {
        showMessageBox("Driver Mobile number must be 10 digits", "warning");
        return;
      }
      if (freight && isNaN(freight)) {
        showMessageBox("Freight must be a numeric value", "warning");
        return;
      }

      const button = document.querySelector(`button[onclick=\"markDone(${index})\"]`);
      if (button) {
        button.disabled = true;
        button.textContent = "Processing...";
        button.classList.add("opacity-50", "cursor-not-allowed");
      }

      try {
        const fileArray = [];
        const file1Array = [];
        for (let i = 0; i < fileInput.files.length; i++) {
          const file = fileInput.files[i];
          fileArray.push({ name: file.name, type: file.type, size: file.size, base64: await fileToBase64(file) });
        }
        for (let i = 0; i < fileInput1.files.length; i++) {
          const file = fileInput1.files[i];
          file1Array.push({ name: file.name, type: file.type, size: file.size, base64: await fileToBase64(file) });
        }

        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "markDone",
            timestamp: order.timestamp,
            orderId: order.orderId,
            dealerName: order.dealerName,
            marketingPersonName: order.marketingPersonName,
            crmName: order.crmName,
            location: order.location,
            dispatchDate: order.dispatchDate,
            fileUploadLink: order.fileUploadLink,
            expectedDeliveryDate: deliveryDate,
            generalRemark: generalRemark,
            vehicleNo: vehicleNo,
            freight: freight,
            driverName: driverName,
            driverMob: driverMob,
            fileArray: fileArray,
            file1Array: file1Array
          })
        });

        showMessageBox("Order marked as done successfully", "success");
        allOrdersData.splice(index, 1);
        renderOrders(allOrdersData);
        if (typeof setReadOnlyMode === "function") setReadOnlyMode();
      } catch (error) {
        showMessageBox(`Error: ${error.message}`, "error");
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = "Mark Done";
          button.classList.remove("opacity-50", "cursor-not-allowed");
        }
      }
    }

    async function fetchOrders() {
      loadingSpinner.style.display = "flex";
      errorMessage.style.display = "none";
      noOrdersMessage.style.display = "none";
      ordersGrid.innerHTML = "";
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const result = await response.json();

        if (result.status === "success" && Array.isArray(result.data) && result.data.length > 0) {
          allOrdersData = result.data;
          renderOrders(result.data);
          if (typeof setReadOnlyMode === "function") setReadOnlyMode();
          noOrdersMessage.style.display = "none";
        } else if (result.status === "success" && Array.isArray(result.data) && result.data.length === 0) {
          noOrdersMessage.style.display = "block";
          allOrdersData = [];
        } else {
          throw new Error(result.message || "Failed to fetch data.");
        }
        lastUpdatedSpan.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        errorText.textContent = `Error: ${error.message}. Please check the API URL or network connection.`;
        errorMessage.style.display = "block";
        noOrdersMessage.style.display = "none";
        allOrdersData = [];
      } finally {
        loadingSpinner.style.display = "none";
        refreshSpinner.style.display = "none";
        refreshText.classList.add("hidden");
      }
    }

    function renderOrders(orders) {
      ordersGrid.innerHTML = "";
      if (orders.length === 0) {
        noOrdersMessage.style.display = "block";
        return;
      }
      noOrdersMessage.style.display = "none";

      orders.forEach((order, index) => {
        const isLate = isPastDate(order.dispatchDate);
        const invoiceExists = hasInvoiceNumber(order.invoiceNumbers);
        const hasEaResponse = String(order.eaResponse || "").trim() !== "";

        let cardClass = "bg-white";
        if (isLate) cardClass = "bg-red-100";
        else if (hasEaResponse) cardClass = "bg-purple-100 border-2 border-purple-300";

        const invoiceStatusClass = invoiceExists ? "text-green-600" : "text-orange-500";
        const invoiceBtnClass = invoiceExists
          ? "w-full bg-green-100 text-green-700 px-4 py-2 rounded-lg font-medium cursor-not-allowed opacity-80"
          : "w-full bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200 font-medium";
        const markDoneBtnClass = invoiceExists
          ? "w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-medium"
          : "w-full bg-gray-400 text-white px-4 py-2 rounded-lg font-medium cursor-not-allowed opacity-80";

        const card = document.createElement("div");
        card.className = `order-card rounded-lg shadow-md p-6 flex flex-col justify-between hover:shadow-xl ${cardClass}`;
        card.setAttribute("data-order-index", index);
        card.innerHTML = `
          <div class="mb-4">
            <h3 class="text-xl font-semibold text-blue-700 mb-2">${order.dealerName || "N/A"}</h3>
            <p class="text-gray-600"><strong class="font-medium">Order ID:</strong> ${order.orderId || "N/A"}</p>
            <p class="text-gray-600"><strong class="font-medium">Marketing Person:</strong> ${order.marketingPersonName || "N/A"}</p>
            <p class="text-gray-600"><strong class="font-medium">CRM Name:</strong> ${order.crmName || "N/A"}</p>
            <p class="text-gray-600"><strong class="font-medium">Location:</strong> ${order.location || "N/A"}</p>
          </div>
          <div class="border-t pt-4 mb-4">
            <p class="text-sm text-gray-500 mb-1"><strong class="font-medium">Expected Dispatch:</strong> <span class="text-blue-500">${formatDispatchDate(order.dispatchDate)}</span></p>
            <p class="text-sm text-gray-500 mb-1"><strong class="font-medium">Order Timestamp:</strong> ${formatTimestamp(order.timestamp)}</p>
            <p class="text-sm text-gray-500 mb-1"><strong class="font-medium">Invoice Status:</strong> <span class="${invoiceStatusClass} font-semibold">${invoiceExists ? "Created" : "Pending"}</span></p>
            ${invoiceExists ? `<p class="text-sm text-gray-600 mb-1"><strong class="font-medium">Invoice Number(s):</strong> ${escapeHtml(order.invoiceNumbers)}</p>` : ""}
            ${hasEaResponse ? `<p class="text-sm text-purple-700 mb-1"><strong class="font-medium">EA Response:</strong> ${escapeHtml(order.eaResponse)}</p>` : ""}
            ${order.fileUploadLink ? `<p class="text-sm text-gray-500 mt-2"><a href="${order.fileUploadLink}" target="_blank" class="text-blue-500 hover:underline">Download Order File</a></p>` : ""}
            ${order.additionalOrder ? `<p class="text-sm text-gray-500"><button onclick="event.stopPropagation(); openMultipleDocuments('${String(order.additionalOrder).replace(/'/g, "\\'")}')" class="text-red-500 hover:underline bg-transparent border-none cursor-pointer p-0 m-0">Additional Order</button></p>` : ""}
          </div>
          <div class="editable">
            <div onclick="event.stopPropagation();">
              <div class="mb-3">
                <label class="block text-sm font-medium mb-1 text-gray-700">Expected Delivery Date:</label>
                <input type="date" id="delivery-${index}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              </div>
              <div class="mb-3 p-4 border border-gray-200 rounded-md bg-gray-50">
                <h4 class="text-md font-semibold text-gray-700 mb-3">Dispatch Details</h4>
                <div class="mb-2"><label class="block text-sm font-medium mb-1 text-gray-700">General Remark:</label><input type="text" id="generalRemark-${index}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter general remarks..." /></div>
                <div class="mb-2"><label class="block text-sm font-medium mb-1 text-gray-700">Vehicle No.:</label><input type="text" id="vehicleNo-${index}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., UP16AB1234" /></div>
                <div class="mb-2"><label class="block text-sm font-medium mb-1 text-gray-700">Freight:</label><input type="number" id="freight-${index}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter freight amount" /></div>
                <div class="mb-2"><label class="block text-sm font-medium mb-1 text-gray-700">Driver Name:</label><input type="text" id="driverName-${index}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter driver's name" /></div>
                <div class="mb-2"><label class="block text-sm font-medium mb-1 text-gray-700">Driver Mob:</label><input type="tel" id="driverMob-${index}" pattern="[0-9]{10}" maxlength="10" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter 10-digit mobile number" /></div>
              </div>
              <div class="mb-4"><label class="file-upload-label">Attach LR Receipt:</label><input type="file" class="file-input" id="file-${index}" multiple onchange="handleFileSelect(${index})" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.xlsx,.xls"><div class="file-selected" id="file-selected-${index}">File selected</div></div>
              <div class="mb-4"><label class="file-upload-label">Attach Invoice:</label><input type="file" class="file-input" id="file1-${index}" multiple onchange="handleFileSelect1(${index})" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.xlsx,.xls"><div class="file-selected" id="file-selected1-${index}">File selected</div></div>
              <div class="grid grid-cols-1 gap-2">
                <button onclick="markInvoiceCreated(${index})" class="${invoiceBtnClass}" ${invoiceExists ? "disabled" : ""}>${invoiceExists ? "Invoice Created (Done)" : "Invoice Created"}</button>
                <button onclick="markDone(${index})" class="${markDoneBtnClass}" ${invoiceExists ? "" : "disabled"}>${invoiceExists ? "Mark Done" : "Mark Done (Invoice Pending)"}</button>
              </div>
            </div>
          </div>
        `;

        card.addEventListener("click", (event) => {
          if (!event.target.closest("a") && !event.target.closest("input") && !event.target.closest("button")) {
            openModal(index);
          }
        });
        ordersGrid.appendChild(card);
      });
    }

    function openMultipleDocuments(urlString) {
      const urls = String(urlString || "").split(",").map((u) => u.trim()).filter(Boolean);
      if (urls.length === 0) {
        showMessageBox("No valid URLs found", "warning");
        return;
      }
      if (urls.length > 1 && !confirm(`This will open ${urls.length} documents in separate tabs. Continue?`)) return;
      urls.forEach((url, i) => setTimeout(() => window.open(url, "_blank"), i * 100));
    }

    function openModal(index) {
      const order = allOrdersData[index];
      if (!order) return;
      modalBody.innerHTML = `
        <p><strong class="font-semibold">Dealer Name:</strong> ${order.dealerName || "N/A"}</p>
        <p><strong class="font-semibold">Order ID:</strong> ${order.orderId || "N/A"}</p>
        <p><strong class="font-semibold">Marketing Person:</strong> ${order.marketingPersonName || "N/A"}</p>
        <p><strong class="font-semibold">CRM Name:</strong> ${order.crmName || "N/A"}</p>
        <p><strong class="font-semibold">Location:</strong> ${order.location || "N/A"}</p>
        <p><strong class="font-semibold">Invoice Number(s):</strong> ${order.invoiceNumbers ? escapeHtml(order.invoiceNumbers) : "N/A"}</p>
        <p><strong class="font-semibold">EA Response:</strong> ${order.eaResponse ? escapeHtml(order.eaResponse) : "N/A"}</p>
        <p><strong class="font-semibold">Order Timestamp:</strong> ${formatTimestamp(order.timestamp)}</p>
        <p><strong class="font-semibold">Expected Dispatch Date:</strong> <span class="text-blue-600 font-bold">${formatDispatchDate(order.dispatchDate)}</span></p>
      `;
      orderDetailModal.style.display = "flex";
      setTimeout(() => {
        orderDetailModal.classList.remove("invisible");
        orderDetailModal.classList.add("opacity-100");
        const content = orderDetailModal.querySelector(".modal-content");
        content.classList.remove("-translate-y-full", "opacity-0");
        content.classList.add("modal-open");
      }, 10);
    }

    function closeModal() {
      orderDetailModal.classList.remove("opacity-100");
      const content = orderDetailModal.querySelector(".modal-content");
      content.classList.add("-translate-y-full", "opacity-0");
      content.classList.remove("modal-open");
      setTimeout(() => {
        orderDetailModal.style.display = "none";
        orderDetailModal.classList.add("invisible");
      }, 300);
    }

    function showMessageBox(message, type = "info") {
      const box = document.createElement("div");
      box.className = "fixed top-4 right-4 p-4 rounded-md shadow-lg text-white z-50";
      const color = type === "success" ? "bg-green-500" : type === "error" ? "bg-red-500" : type === "warning" ? "bg-yellow-500" : "bg-blue-500";
      box.classList.add(color);
      box.innerHTML = `<div class="flex items-center justify-between"><span>${message}</span><button class="ml-4 text-white font-bold" onclick="this.parentElement.parentElement.remove()">&times;</button></div>`;
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 3000);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && orderDetailModal.classList.contains("opacity-100")) closeModal();
    });
    orderDetailModal.addEventListener("click", (e) => {
      if (e.target === orderDetailModal) closeModal();
    });
    closeModalButton.addEventListener("click", closeModal);

    fetchOrders();
    setInterval(() => {
      refreshSpinner.style.display = "block";
      refreshText.classList.remove("hidden");
      fetchOrders();
    }, 300 * 1000);

    document.getElementById("current-year").textContent = new Date().getFullYear();
  </script>
  <script src="js/viewOnly.js"></script>
</body>
</html>
